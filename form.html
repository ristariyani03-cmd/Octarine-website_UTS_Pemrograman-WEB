<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Membership | Octarinē.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Override Bootstrap khusus untuk halaman ini agar senada dengan Octarine */
        .form-control:focus {
            border-color: var(--antique-gold);
            box-shadow: 0 0 0 0.25rem rgba(166, 139, 91, 0.25);
        }
        .btn-register {
            background-color: var(--dark-accent);
            color: var(--antique-gold);
            border: none;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn-register:hover {
            background-color: var(--antique-gold);
            color: var(--white);
        }
    </style>
</head>
<body>

    <nav class="navbar-native">
        <div class="container-native nav-content">
            <a href="landing-page.html" class="logo">Octarinē.</a>
            <ul class="nav-links">
                <li><a href="landing-page.html">Home</a></li>
                <li><a href="data.html">Collections</a></li>
                <li><a href="form.html" class="active">Member</a></li>
                <li><a href="login.html" class="btn-login-nav">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg" style="background-color: rgba(255,255,255,0.9); border-radius: 15px;">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h2 style="font-family: 'Montserrat', serif; font-size: 40px;">Join the Inner Circle</h2>
                            <p class="text-muted text-uppercase" style="font-size: 12px; letter-spacing: 2px;">Dapatkan akses eksklusif ke koleksi terbatas kami.</p>
                        </div>

                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase">Nama Lengkap</label>
                                    <input type="text" class="form-control form-control-lg fs-6" placeholder="Masukkan nama" required>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase">Email</label>
                                    <input type="email" class="form-control form-control-lg fs-6" placeholder="nama@email.com" required>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label small fw-bold text-uppercase">Password</label>
                                    <input type="password" class="form-control form-control-lg fs-6" placeholder="••••••••" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase">Preferensi Aroma</label>
                                    <select class="form-select form-select-lg fs-6">
                                        <option selected>Pilih aroma favorit...</option>
                                        <option value="1">Maskulin (Woody/Spicy)</option>
                                        <option value="2">Unisex (Gourmand/Sweet)</option>
                                        <option value="3">Fresh (Citrus/Sage)</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase">Gender</label>
                                    <div class="mt-2">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="gender" id="pria" value="pria">
                                            <label class="form-check-label" for="pria">Pria</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="gender" id="wanita" value="wanita">
                                            <label class="form-check-label" for="wanita">Wanita</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label small fw-bold text-uppercase">Alamat Lengkap</label>
                                    <textarea class="form-control fs-6" rows="3" placeholder="Masukkan alamat untuk pengiriman promo..."></textarea>
                                </div>

                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="newsletter">
                                        <label class="form-check-label small" for="newsletter">
                                            Saya setuju untuk menerima update terbaru dari Octarinē.
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-register w-100">Daftar Sekarang</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-native">
        <div class="container-native text-center">
            <p style="margin-bottom: 40px; color: #666;">Kualitas Tahan Lama. Karakter Tak Terlupakan.</p>
            <div style="font-size: 11px; letter-spacing: 1px; color: #666;">
                &copy; OCTARINE FRAGRANCE INDONESIA
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
