            <form action="data.html"> <div class="form-group">

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="login-extra-native">
                    <label><input type="checkbox"> Ingat Saya</label>
                    <a href="#">Lupa Password?</a>
                </div>
            </form>

            <div class="login-footer-links">
                <p>Belum memiliki akun?<a href="#form.html"> Sign in</a></p>
                <p style="margin-top: 10px;"><a href="landing-page.html">&larr; Kembali ke Beranda</a></p>
            </div>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; color: var(--text-dark); font-size: 12px;">
        &copy; 2026 OCTARINĒ PERFUMERY - Management System
    </footer>
